<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wunschlisten‑App (Kader & Ercan)</title>
  <meta name="theme-color" content="#111827" />

  <!-- Progressive Web App manifest -->
  <link rel="manifest" href="./manifest.webmanifest">
  <style>
  :root { --radius: 14px; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, Noto Sans, "Apple Color Emoji","Segoe UI Emoji"; }
  .wrap { min-height: 100vh; padding: 24px; background-image: linear-gradient(135deg,#ffe4e6,#fae8ff,#dbeafe); }
  .container { max-width: 1120px; margin: 0 auto; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .header { display:flex; align-items:end; justify-content:space-between; gap: 12px; margin-bottom: 16px; }
  h1 { margin: 0; font-size: 28px; }
  .muted { color: #666; }
  .card { background: #fff; border-radius: var(--radius); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .card.pad { padding: 16px; }
  .stats { display:grid; grid-template-columns: repeat(auto-fit,minmax(180px,1fr)); gap: 12px; }
  .stat { display:flex; gap:8px; align-items:center; padding: 12px 14px; border-radius: var(--radius); background:#fafafa; }
  .stat .label { font-size: 12px; color:#666 }
  .stat .value { font-weight: 700; font-size: 18px; }
  .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(280px,1fr)); gap: 12px; }
  input, select, textarea, button { font: inherit; }
  .input, .select, .btn { padding:10px 12px; border-radius: 10px; border:1px solid #ddd; background:#fff; }
  .btn { cursor: pointer; }
  .btn.primary { background:#111827; color:#fff; border-color:#111827; }
  .btn.ghost { background:transparent; }
  .btn:disabled { opacity:.6; cursor:not-allowed; }
  .toolbar { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .label { display:block; font-size:12px; color:#555; margin-bottom:4px; }
  .badge { font-size: 12px; padding: 4px 8px; border-radius: 999px; background:#f1f5f9; color:#0f172a; }
  .badge.slate { background:#e2e8f0; color:#0f172a }
  .badge.amber { background:#fde68a; color:#78350f }
  .badge.sky { background:#bae6fd; color:#0c4a6e }
  .badge.emerald { background:#a7f3d0; color:#065f46 }
  .badge.violet { background:#ddd6fe; color:#4c1d95 }
  .pillcat { font-size: 12px; padding: 4px 8px; border-radius: 999px; }
  .cat-0 { background:#ffe4e6; color:#9f1239 }
  .cat-1 { background:#dbeafe; color:#1e3a8a }
  .cat-2 { background:#dcfce7; color:#065f46 }
  .cat-3 { background:#ede9fe; color:#4c1d95 }
  .cat-4 { background:#fef3c7; color:#78350f }
  .cat-5 { background:#ccfbf1; color:#115e59 }
  .footer { text-align:center; color:#666; font-size:12px; padding: 20px 0; }
  .listnote { color:#6b7280; font-size: 13px; margin-top: 6px; }
  .progressBar { height: 8px; background:#f1f5f9; border-radius:999px; overflow:hidden }
  .progressFill { height:100%; background:#111827 }
  .chip { display:inline-flex; align-items:center; gap:6px; border:1px solid #e5e7eb; border-radius:999px; padding:6px 10px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React & ReactDOM (UMD), Babel for in-browser JSX -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
  const {useState, useMemo, useEffect} = React;

  // ---------- Helpers ----------
  const STORAGE_KEY = "wish_app_items_v3";
  const STORAGE_CFG_KEY = "wish_app_cfg_v1";
  const euro = (n) =>
    n === undefined || n === null || isNaN(Number(n))
      ? "–"
      : new Intl.NumberFormat("de-DE", { style: "currency", currency: "EUR" }).format(Number(n));

  const categories = ["Kinder", "Haushalt", "Reparatur", "Geschenk", "Schule", "Wunsch", "Invest", "Sonstiges"];
  const priorities = ["hoch","mittel","niedrig"];
  const statuses = ["offen","sparen","bestellt","erledigt","idee"];

  const defaultItems = [
    {
      id: (crypto && crypto.randomUUID) ? crypto.randomUUID() : String(Math.random()),
      category: "Kinder",
      title: "Neuer Ranzen für Ezgi",
      priority: "hoch",
      price: 65,
      link: "",
      status: "offen",
      due: new Date().toISOString().slice(0,10),
      note: "Vor Schulstart besorgen",
      createdAt: Date.now(),
    },
    {
      id: (crypto && crypto.randomUUID) ? crypto.randomUUID() : String(Math.random()),
      category: "Haushalt",
      title: "Geschirrspüler",
      priority: "mittel",
      price: 280,
      link: "",
      status: "sparen",
      due: "",
      note: "Gebraucht suchen, max. 300€",
      createdAt: Date.now(),
    },
  ];

  function useLocalStorageItems() {
    const [items, setItems] = useState(() => {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return defaultItems;
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : defaultItems;
      } catch (e) {
        return defaultItems;
      }
    });
    useEffect(() => {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); } catch {}
    }, [items]);
    return [items, setItems];
  }

  function useConfig() {
    const [cfg, setCfg] = useState(() => {
      try {
        const raw = localStorage.getItem(STORAGE_CFG_KEY);
        const base = { balance: 0, cart: [] };
        if (!raw) return base;
        const parsed = JSON.parse(raw);
        return { ...base, ...(parsed || {}) };
      } catch {
        return { balance: 0, cart: [] };
      }
    });
    useEffect(() => { try { localStorage.setItem(STORAGE_CFG_KEY, JSON.stringify(cfg)); } catch {} }, [cfg]);
    return [cfg, setCfg];
  }

  function getCategoryTotals(items) {
    const map = new Map();
    for (const it of items) {
      const k = it.category || "Sonstiges";
      const prev = map.get(k) || 0;
      map.set(k, prev + (Number(it.price) || 0));
    }
    return Array.from(map.entries()).map(([name, value]) => ({ name, value }));
  }

  function App() {
    const [theme, setTheme] = useState("rose");
    const [items, setItems] = useLocalStorageItems();
    const [cfg, setCfg] = useConfig();

    const [query, setQuery] = useState("");
    const [filterCat, setFilterCat] = useState("alle");
    const [filterStatus, setFilterStatus] = useState("alle");
    const [filterPri, setFilterPri] = useState("alle");
    const [sort, setSort] = useState("created-desc");
    const [showOnlyOpen, setShowOnlyOpen] = useState(false);

    const [draft, setDraft] = useState({
      category: "Kinder", title: "", priority: "mittel",
      price: "", link: "", status: "offen", due: "", note: ""
    });

    const filtered = useMemo(() => {
      let list = items.slice();
      if (query.trim()) {
        const q = query.toLowerCase();
        list = list.filter((i) => [i.title, i.note, i.category, i.status].some((v) => (v || "").toLowerCase().includes(q)));
      }
      if (filterCat !== "alle") list = list.filter((i) => i.category === filterCat);
      if (filterStatus !== "alle") list = list.filter((i) => i.status === filterStatus);
      if (filterPri !== "alle") list = list.filter((i) => i.priority === filterPri);
      if (showOnlyOpen) list = list.filter((i) => i.status !== "erledigt");

      switch (sort) {
        case "price-desc": list.sort((a,b)=>(Number(b.price)||0)-(Number(a.price)||0)); break;
        case "price-asc": list.sort((a,b)=>(Number(a.price)||0)-(Number(b.price)||0)); break;
        case "due-asc": list.sort((a,b)=> (a.due||'').localeCompare(b.due||'')); break;
        case "prio": {
          const order = { hoch:0, mittel:1, niedrig:2 };
          list.sort((a,b)=>(order[a.priority] ?? 99) - (order[b.priority] ?? 99));
          break;
        }
        default: list.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
      }
      return list;
    }, [items, query, filterCat, filterPri, filterStatus, sort, showOnlyOpen]);

    const totals = useMemo(() => {
      const sum = items.reduce((acc, i) => acc + (Number(i.price) || 0), 0);
      const done = items.filter((i) => i.status === "erledigt").length;
      return { count: items.length, sum, done };
    }, [items]);

    // Warenkorb/Rest
    const cartSet = useMemo(() => new Set(cfg.cart || []), [cfg.cart]);
    const selectedSum = useMemo(() => items.reduce((acc, it) => acc + (cartSet.has(it.id) ? (Number(it.price)||0) : 0), 0), [items, cartSet]);
    const remaining = useMemo(() => (Number(cfg.balance)||0) - selectedSum, [cfg.balance, selectedSum]);

    // actions
    function resetDraft(){ setDraft({ category:"Kinder", title:"", priority:"mittel", price:"", link:"", status:"offen", due:"", note:"" }); }
    function addItem(){
      if (!draft.title.trim()) return;
      const it = { id: (crypto && crypto.randomUUID) ? crypto.randomUUID() : String(Math.random()), createdAt: Date.now(), ...draft, price: Number(draft.price) || 0 };
      setItems((s)=>[it, ...s]); resetDraft();
    }
    function updateItem(id, patch){ setItems((s)=> s.map((i)=> i.id===id ? { ...i, ...patch } : i)); }
    function removeItem(id){ setItems((s)=> s.filter((i)=> i.id!==id)); setCfg((c)=> ({ ...c, cart: (c.cart||[]).filter((x)=> x!==id) })); }
    function exportJSON(){
      const blob = new Blob([JSON.stringify(items,null,2)], { type:"application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href = url; a.download = `wunschliste-${new Date().toISOString().slice(0,10)}.json`; a.click(); URL.revokeObjectURL(url);
    }
    function onImport(e){
      const file = e.target.files?.[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = () => { try { const data = JSON.parse(String(reader.result)); if (Array.isArray(data)) setItems(data); } catch {} };
      reader.readAsText(file);
    }
    function toggleCart(id){
      setCfg((c)=>{ const set = new Set(c.cart || []); set.has(id) ? set.delete(id) : set.add(id); return { ...c, cart: Array.from(set) }; });
    }
    function setAllFilteredToCart(on){
      setCfg((c)=>{ const set = new Set(c.cart || []); for (const it of filtered){ on ? set.add(it.id) : set.delete(it.id); } return { ...c, cart: Array.from(set) }; });
    }

    const themeGrad = {
      rose: "linear-gradient(135deg,#ffe4e6,#fae8ff,#dbeafe)",
      sky: "linear-gradient(135deg,#e0f2fe,#e0f7ff,#eef2ff)",
      emerald: "linear-gradient(135deg,#d1fae5,#dcfce7,#e0f2fe)",
      violet: "linear-gradient(135deg,#ede9fe,#f5d0fe,#e0e7ff)",
      amber: "linear-gradient(135deg,#fef3c7,#fde68a,#ffedd5)",
    };
    const statusClass = (s) => {
      switch(s){
        case "offen": return "badge slate";
        case "sparen": return "badge amber";
        case "bestellt": return "badge sky";
        case "erledigt": return "badge emerald";
        case "idee": return "badge violet";
        default: return "badge";
      }
    };

    const pieBars = useMemo(()=>{
      const totals = getCategoryTotals(items);
      const all = totals.reduce((a,t)=>a+t.value,0) || 1;
      return totals.map((t,i)=> ({ ...t, pct: Math.round((t.value/all)*100), cls: \`cat-\${i%6}\` }));
    }, [items]);

    // Tests to console
    useEffect(()=>{
      function assert(name, cond){ console[cond ? 'log' : 'error'](cond ? \`✅ \${name}\` : \`❌ \${name}\`); }
      try {
        const base = [{ id: "1", title: "x", price: 1, category: "Wunsch", priority: "mittel", status: "offen", createdAt: 1 }];
        const added = [{ id: "2", title: "y", price: 2, category: "Kinder", priority: "hoch", status: "offen", createdAt: 2 }, ...base];
        assert("Add keeps length+1", added.length === base.length + 1);
        const filt = added.filter((i)=> i.category === "Kinder");
        assert("Filter by category works", filt.length === 1 && filt[0].category === "Kinder");
        const sum = added.reduce((a,i)=> a + (Number(i.price)||0), 0);
        assert("Sum numbers correctly", sum === 3);
        const json = JSON.stringify(added);
        assert("Export json string", typeof json === "string" && json.includes("title"));
        const cfgTest = { balance: 5000, cart: ["2"] };
        const selected = added.filter((i)=>cfgTest.cart.includes(i.id)).reduce((a,i)=>a+(i.price||0),0);
        assert("Remaining correct", (cfgTest.balance - selected) === 4998);
      } catch(e){ console.error("Tests crashed", e); }
    }, []);

    return (
      <div className="wrap" style={{ backgroundImage: themeGrad[theme] }}>
        <div className="container">
          <div className="header">
            <div>
              <h1>Wunschlisten‑App <span className="muted">(Kader & Ercan)</span></h1>
              <div className="muted">Alle Wünsche, Reparaturen, Geschenke & Invests – hübsch, schnell, unkompliziert.</div>
            </div>
            <div className="toolbar">
              <select className="select" value={theme} onChange={(e)=>setTheme(e.target.value)}>
                <option value="rose">🌸 Rose</option>
                <option value="sky">☁️ Sky</option>
                <option value="emerald">🌿 Emerald</option>
                <option value="violet">🫐 Violet</option>
                <option value="amber">🍯 Amber</option>
              </select>
              <div className="chip">
                <label htmlFor="balance" className="label" style={{ margin: 0 }}>Bargeld (€)</label>
                <input id="balance" className="input" style={{ width: 120 }} type="number" inputMode="decimal"
                  value={cfg.balance}
                  onChange={(e)=> setCfg((c)=> ({ ...c, balance: Number(e.target.value) || 0 }))} />
              </div>
              <button className="btn" onClick={exportJSON}>Export</button>
              <label className="btn ghost" style={{ cursor: 'pointer' }}>
                Import
                <input type="file" accept="application/json" onChange={onImport} style={{ display: 'none' }} />
              </label>
            </div>
          </div>

          <div className="stats">
            <div className="stat"><div><div className="label">Einträge</div><div className="value">{totals.count}</div></div></div>
            <div className="stat"><div><div className="label">Gesamtsumme</div><div className="value">{euro(totals.sum)}</div></div></div>
            <div className="stat"><div><div className="label">Erledigt</div><div className="value">{items.filter(i=>i.status==="erledigt").length}</div></div></div>
          </div>

          <div className="stats" style={{ marginTop: 12 }}>
            <div className="stat"><div><div className="label">Bargeld (in der Hand)</div><div className="value">{euro(cfg.balance)}</div></div></div>
            <div className="stat"><div><div className="label">Auswahl (Warenkorb)</div><div className="value">{euro(selectedSum)}</div></div></div>
            <div className="stat"><div><div className="label">Rest nach Auswahl</div><div className="value" style={{ color: (remaining < 0) ? '#b91c1c' : undefined }}>{euro(remaining)}</div></div></div>
          </div>

          <div className="card pad" style={{ marginTop: 16 }}>
            <div className="row">
              <div style={{ flex: "160px 0 0" }}>
                <label className="label">Kategorie</label>
                <select className="select" value={draft.category} onChange={(e)=>setDraft(d=>({...d, category:e.target.value}))}>
                  {categories.map(c => <option key={c} value={c}>{c}</option>)}
                </select>
              </div>
              <div style={{ flex: "1 1 auto", minWidth: 200 }}>
                <label className="label">Beschreibung</label>
                <input className="input" placeholder="z. B. Winterjacke für Cem" value={draft.title} onChange={(e)=>setDraft(d=>({...d,title:e.target.value}))} />
              </div>
              <div style={{ width: 140 }}>
                <label className="label">Priorität</label>
                <select className="select" value={draft.priority} onChange={(e)=>setDraft(d=>({...d, priority:e.target.value}))}>
                  {priorities.map(p => <option key={p} value={p}>{p}</option>)}
                </select>
              </div>
              <div style={{ width: 120 }}>
                <label className="label">Preis (€)</label>
                <input className="input" type="number" inputMode="decimal" value={draft.price} onChange={(e)=>setDraft(d=>({...d, price:e.target.value}))} />
              </div>
              <div style={{ flex: "1 1 200px" }}>
                <label className="label">Link / Ort</label>
                <input className="input" placeholder="URL oder Laden" value={draft.link} onChange={(e)=>setDraft(d=>({...d, link:e.target.value}))} />
              </div>
              <div style={{ width: 160 }}>
                <label className="label">Status</label>
                <select className="select" value={draft.status} onChange={(e)=>setDraft(d=>({...d, status:e.target.value}))}>
                  {statuses.map(s => <option key={s} value={s}>{s}</option>)}
                </select>
              </div>
              <div style={{ width: 170 }}>
                <label className="label">Fällig am</label>
                <input className="input" type="date" value={draft.due} onChange={(e)=>setDraft(d=>({...d, due:e.target.value}))} />
              </div>
              <div style={{ flex: "1 1 100%" }}>
                <label className="label">Notiz</label>
                <textarea className="input" rows={2} value={draft.note} onChange={(e)=>setDraft(d=>({...d, note:e.target.value}))} />
              </div>
              <div style={{ width: "100%", display: "flex", justifyContent: "flex-end" }}>
                <button className="btn primary" onClick={addItem}>+ Hinzufügen</button>
              </div>
            </div>
          </div>

          <div className="card pad" style={{ marginTop: 12 }}>
            <div className="row" style={{ alignItems: "end" }}>
              <div style={{ flex: "1 1 240px", position: "relative" }}>
                <label className="label">Suche</label>
                <input className="input" placeholder="Suche…" value={query} onChange={(e)=>setQuery(e.target.value)} />
              </div>
              <div>
                <label className="label">Kategorie</label>
                <select className="select" value={filterCat} onChange={(e)=>setFilterCat(e.target.value)}>
                  <option value="alle">Alle Kategorien</option>
                  {categories.map(c => <option key={c} value={c}>{c}</option>)}
                </select>
              </div>
              <div>
                <label className="label">Status</label>
                <select className="select" value={filterStatus} onChange={(e)=>setFilterStatus(e.target.value)}>
                  <option value="alle">Alle Stati</option>
                  {statuses.map(s => <option key={s} value={s}>{s}</option>)}
                </select>
              </div>
              <div>
                <label className="label">Priorität</label>
                <select className="select" value={filterPri} onChange={(e)=>setFilterPri(e.target.value)}>
                  <option value="alle">Alle Prio</option>
                  {priorities.map(p => <option key={p} value={p}>{p}</option>)}
                </select>
              </div>
              <div>
                <label className="label">Sortierung</label>
                <select className="select" value={sort} onChange={(e)=>setSort(e.target.value)}>
                  <option value="created-desc">Neueste zuerst</option>
                  <option value="price-desc">Preis ↓</option>
                  <option value="price-asc">Preis ↑</option>
                  <option value="due-asc">Fällig (früh)</option>
                  <option value="prio">Priorität</option>
                </select>
              </div>
              <div>
                <label className="label">Nur offene</label>
                <input type="checkbox" checked={showOnlyOpen} onChange={(e)=>setShowOnlyOpen(e.target.checked)} />
              </div>
              <div>
                <label className="label">Warenkorb</label>
                <div style={{ display: 'flex', gap: 6 }}>
                  <button className="btn" onClick={()=>setAllFilteredToCart(true)}>+ alle (gefiltert)</button>
                  <button className="btn" onClick={()=>setAllFilteredToCart(false)}>– alle (gefiltert)</button>
                </div>
              </div>
            </div>
          </div>

          <div className="card pad" style={{ marginTop: 12 }}>
            <div style={{ fontWeight: 600, marginBottom: 8 }}>Budget nach Kategorie</div>
            <div className="row" style={{ flexDirection: "column" }}>
              {/* Simple bars, no chart lib */}
              {pieBars.length === 0 && <div className="muted">Keine Daten</div>}
              {pieBars.map((b, idx) => (
                <div key={b.name} style={{ width: "100%" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                    <span className={`pillcat ${b.cls}`}>{b.name}</span>
                    <span className="muted">{euro(b.value)} · {b.pct}%</span>
                  </div>
                  <div className="progressBar"><div className="progressFill" style={{ width: `${b.pct}%` }} /></div>
                </div>
              ))}
            </div>
          </div>

          <div className="grid" style={{ marginTop: 12 }}>
            {filtered.map((it, i) => (
              <div key={it.id} className="card pad">
                <div style={{ display: "flex", justifyContent: "space-between", gap: 8 }}>
                  <div>
                    <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                      <span className={`pillcat cat-${i % 6}`}>{it.category}</span>
                      <strong>{it.title}</strong>
                    </div>
                    <div className="listnote">
                      <span className="badge">{it.priority}</span>
                      <span style={{ margin: "0 6px" }} />
                      <span className={statusClass(it.status)}>{it.status}</span>
                      {it.due && <span style={{ marginLeft: 8 }}>📅 {it.due}</span>}
                      <span style={{ marginLeft: 8 }}>{euro(it.price)}</span>
                    </div>
                  </div>
                  <div style={{ display: "flex", gap: 6, alignItems: 'center' }}>
                    <label className="chip">
                      <input type="checkbox" checked={cartSet.has(it.id)} onChange={()=>toggleCart(it.id)} />
                      In Vergleich
                    </label>
                    {it.link && (<button className="btn" onClick={() => window.open(it.link, "_blank")}>Link</button>)}
                    <button className="btn" onClick={() => updateItem(it.id, { status: it.status === "erledigt" ? "offen" : "erledigt" })}>
                      {it.status === "erledigt" ? "Re-öffnen" : "Erledigt"}
                    </button>
                    <button className="btn" onClick={() => removeItem(it.id)}>Löschen</button>
                  </div>
                </div>
                {it.note && <div className="listnote">{it.note}</div>}
              </div>
            ))}
          </div>

          <div className="footer">Speichert automatisch lokal im Browser. Kein Account nötig.</div>
        </div>
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App />);
  </script>

  <!-- Register service worker for offline support -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./service-worker.js');
      });
    }
  </script>
</body>
</html>
